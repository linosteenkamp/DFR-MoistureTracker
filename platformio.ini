; PlatformIO Project Configuration File
; Project: DFR-MoistureTracker
; Description: ESP32-C6 soil moisture and battery monitoring system

[platformio]
; `pio run` (no -e) builds the firmware env only. The native env is
; test-only — run host tests with `pio test -e native`.
default_envs = dfrobot_firebeetle2_esp32c6

[env]
; Pinned to the pioarduino fork — it provides the DFRobot FireBeetle 2 ESP32-C6
; board + ESP-IDF 5.x/C6 support. Unpinned `espressif32` resolves to the official
; registry (7.x) in clean CI, which does NOT know this board (UnknownBoard).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31-2/platform-espressif32.zip
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv

[env:dfrobot_firebeetle2_esp32c6]
board = dfrobot_firebeetle2_esp32c6
upload_port = /dev/cu.usbmodem83201
monitor_port = /dev/cu.usbmodem83201
test_framework = unity
test_filter = test_calibration_nvs
; Uncomment to disable deep sleep for local testing (stays awake, re-publishes every 5s)
; build_flags = -DDISABLE_DEEP_SLEEP

[env:dfrobot_firebeetle2_esp32c6_zigbee]
extends = env:dfrobot_firebeetle2_esp32c6
; CI injects the firmware version from the git tag, e.g.:
;   PLATFORMIO_BUILD_FLAGS="-DFW_VER_MAJOR=1 -DFW_VER_MINOR=2 -DFW_VER_PATCH=3"
build_flags = -DUSE_ZIGBEE
; This pure-espidf platform never passes -DSDKCONFIG_DEFAULTS to cmake and the
; Arduino-only custom_sdkconfig hook is a no-op here, so inject the defaults
; list directly. ESP-IDF applies these in order when regenerating the per-env
; sdkconfig, making the Zigbee config survive a deleted/clean sdkconfig.
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.zigbee"

; Bench-test env: same as the Zigbee env but stays awake (no deep sleep) so the
; USB-Serial-JTAG stays up for observing the join and re-flashing. Not for deployment.
[env:dfrobot_firebeetle2_esp32c6_zigbee_test]
extends = env:dfrobot_firebeetle2_esp32c6_zigbee
build_flags = -DUSE_ZIGBEE -DDISABLE_DEEP_SLEEP

[env:native]
platform = native
framework =
test_framework = unity
; -lm: zigbee_encode.c uses lroundf() (<math.h>); macOS libc resolves it without
; -lm, but Linux/glibc (CI) needs the math lib explicitly linked.
build_flags = -std=c11 -Wall -Wextra -I include -lm
; Host env exists only for `pio test -e native` — tests include the SUT
; source files directly via #include. Exclude src/ from regular builds so
; `pio run` (no -e flag) doesn't try to compile ESP-IDF code on the host.
build_src_filter = -<*>
test_filter =
    test_smoke
    test_form_parser
    test_percentage_math
    test_calibration_fallback
    test_display
    test_battery_monitor
    test_zigbee_encode
    test_ota_version